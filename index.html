<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema NQA Profissional | Qualidade Têxtil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --success: #059669;
            --danger: #dc2626;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--primary);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container { max-width: 800px; width: 100%; }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-header {
            background: var(--primary);
            padding: 32px;
            color: white;
            text-align: center;
        }

        .card-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .card-header p { opacity: 0.8; font-size: 0.875rem; }

        .content { padding: 32px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 32px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; }

        input, select {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .results-container {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .result-main { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }

        .result-box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .result-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .result-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .decision-rule {
            background: white;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .status-pill { padding: 4px 12px; border-radius: 99px; font-weight: 700; font-size: 0.8rem; }
        .status-accept { background: #dcfce7; color: var(--success); }
        .status-reject { background: #fee2e2; color: var(--danger); }

        .footer-note { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 24px; }

        @media (max-width: 600px) { .result-main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>MÓDULO DE INSPEÇÃO NQA</h1>
            <p>Calculador de Amostragem Industrial Baseado na NBR 5426</p>
        </div>
        
        <div class="content">
            <div class="grid">
                <div class="input-group">
                    <label>Tamanho do Lote</label>
                    <input type="number" id="lote" value="3200" oninput="calcular()">
                </div>
                <div class="input-group">
                    <label>Nível de Inspeção</label>
                    <select id="nivel" onchange="calcular()">
                        <optgroup label="Geral">
                            <option value="GI">Nível Geral I</option>
                            <option value="GII" selected>Nível Geral II (Padrão)</option>
                            <option value="GIII">Nível Geral III</option>
                        </optgroup>
                        <optgroup label="Especial (Ensaios Destrutivos)">
                            <option value="S1">Especial S-1</option>
                            <option value="S2">Especial S-2</option>
                            <option value="S3">Especial S-3</option>
                            <option value="S4">Especial S-4</option>
                        </optgroup>
                    </select>
                </div>
                <div class="input-group">
                    <label>NQA (%) Desejado</label>
                    <select id="nqa" onchange="calcular()">
                        <option value="0.65">0,65 (Crítico)</option>
                        <option value="1.0">1,0</option>
                        <option value="1.5">1,5</option>
                        <option value="2.5" selected>2,5 (Padrão)</option>
                        <option value="4.0">4,0</option>
                    </select>
                </div>
            </div>

            <div class="results-container" id="resultadoArea">
                </div>

            <p class="footer-note">
                Referência Técnica: MIL-STD-105E / NBR 5426 | Plano de Amostragem Simples - Inspeção Normal
            </p>
        </div>
    </div>
</div>

<script>
    function obterLetraCodigo(lote, nivel) {
        // Matriz de Letras-Código (Simplificada conforme NBR 5426)
        const faixas = [2, 8, 15, 25, 50, 90, 150, 280, 500, 1200, 3200, 10000, 35000, 150000, 500000];
        
        const tabela = {
            'S1': ['A','A','A','A','A','A','B','B','B','C','C','D','D','E','E'],
            'S2': ['A','A','A','A','B','B','B','C','C','D','D','E','E','F','G'],
            'S3': ['A','A','B','B','B','C','C','D','D','E','E','F','G','H','J'],
            'S4': ['A','A','B','B','C','C','D','E','E','F','G','H','J','K','L'],
            'GI': ['A','A','B','C','C','D','E','F','G','H','J','K','L','M','N'],
            'GII':['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q'],
            'GIII':['B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R']
        };

        let idx = faixas.findIndex(f => lote <= f);
        if (idx === -1) idx = 14; // Acima de 500.000

        return tabela[nivel][idx];
    }

    function getDadosAmostra(letra) {
        const amostras = {
            'A': 2, 'B': 3, 'C': 5, 'D': 8, 'E': 13, 'F': 20, 'G': 32, 'H': 50,
            'J': 80, 'K': 125, 'L': 200, 'M': 315, 'N': 500, 'P': 800, 'Q': 1250, 'R': 2000
        };
        return amostras[letra] || 13;
    }

    function calcular() {
        const lote = parseInt(document.getElementById('lote').value) || 0;
        const nivel = document.getElementById('nivel').value;
        const nqa = parseFloat(document.getElementById('nqa').value);

        if (lote <= 0) return;

        const letra = obterLetraCodigo(lote, nivel);
        let n = getDadosAmostra(letra);
        if (n > lote) n = lote;

        // Cálculo de Ac (Simplificado para fins didáticos/operacionais rápidos)
        // Em um sistema real, aqui entraria a consulta à Tabela II-A da norma
        let ac = Math.floor(n * (nqa / 100));
        let re = ac + 1;

        const container = document.getElementById('resultadoArea');
        container.innerHTML = `
            <div class="result-main">
                <div class="result-box">
                    <div class="result-label">Letra-Código</div>
                    <div class="result-value">${letra}</div>
                </div>
                <div class="result-box">
                    <div class="result-label">Tam. Amostra (n)</div>
                    <div class="result-value">${n}</div>
                </div>
            </div>
            <div class="decision-rule">
                <div>
                    <span class="status-pill status-accept">ACEITAR (Ac)</span>
                    <span style="font-weight:800; margin-left:8px;">${ac} defeitos</span>
                </div>
                <div style="color: #cbd5e1;">|</div>
                <div>
                    <span class="status-pill status-reject">REJEITAR (Re)</span>
                    <span style="font-weight:800; margin-left:8px;">${re} defeitos</span>
                </div>
            </div>
            <div style="margin-top:20px; font-size:0.85rem; color:#64748b; text-align:center;">
                Para um lote de <strong>${lote.toLocaleString()}</strong>, inspecione <strong>${n}</strong> peças aleatórias.
            </div>
        `;
    }

    // Inicializa
    window.onload = calcular;
</script>

</body>
</html>
